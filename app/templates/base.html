<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}KokomiAPI Dashboard{% endblock %}</title>
    <script src="/static/vendor/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/main.css" />
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <div class="dashboard-container">
      <!-- 左侧导航 -->
      <aside class="sidebar">
        <!-- 产品名称 -->
        <div class="sidebar-brand">
          <h1>KokomiAPI Dashboard</h1>
        </div>

        <!-- 节点标识 -->
        <div class="sidebar-node">
          <span class="node-name">{{ node_name }}</span>
        </div>

        <!-- 导航菜单 -->
        <nav class="sidebar-nav">
          <a
            href="/dashboard/overview"
            class="nav-item {% if active_page == 'overview' %}active{% endif %}"
          >
            <span class="nav-icon">📋</span>
            <span class="nav-label">概览</span>
          </a>
          <a
            href="/dashboard/api-stats"
            class="nav-item {% if active_page == 'api_stats' %}active{% endif %}"
          >
            <span class="nav-icon">🔌</span>
            <span class="nav-label">API 统计</span>
          </a>
          <div class="nav-section-title">更多</div>
          <a href="#" class="nav-item disabled">
            <span class="nav-icon">🌐</span>
            <span class="nav-label">HTTP 请求</span>
            <span class="nav-badge">不久</span>
          </a>
          <a href="#" class="nav-item disabled">
            <span class="nav-icon">⏳</span>
            <span class="nav-label">Celery 任务</span>
            <span class="nav-badge">不久</span>
          </a>
        </nav>

        <!-- 底部 GitHub 链接 -->
        <div class="sidebar-footer">
          <a href="{{ github_url }}" target="_blank" class="github-link">
            <span class="github-icon">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path
                  d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
                />
              </svg>
            </span>
            <span class="github-text">GitHub</span>
          </a>
        </div>
      </aside>

      <!-- 右侧内容区 -->
      <main class="main-content">
        <header class="content-header">
          <h2>{% block page_title %}{% endblock %}</h2>
          <div class="header-info">
            <span>🕐 更新于: <span id="update-time">加载中...</span></span>
          </div>
        </header>
        <div class="content-body">{% block content %}{% endblock %}</div>
      </main>
    </div>

    <script>
      document.getElementById("update-time").textContent =
        new Date().toLocaleString("zh-CN");
    </script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
