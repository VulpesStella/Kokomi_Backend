<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API 运行状态监控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  </head>
  <body class="bg-gray-50 p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
      <h1 class="text-2xl font-bold text-gray-800 mb-8">API 实时监控概览</h1>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="space-y-4">
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <p class="text-sm text-gray-500 font-medium">总请求数</p>
            <p class="text-3xl font-bold text-blue-600">
              {{ stats.total_requests }}
            </p>
          </div>

          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <p class="text-sm text-gray-500 font-medium">平均延迟</p>
            <p class="text-3xl font-bold text-green-600">
              {{ stats.avg_latency }}
            </p>
          </div>

          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <p class="text-sm text-gray-500 font-medium">错误率</p>
            <p class="text-3xl font-bold text-red-500">
              {{ stats.error_rate }}
            </p>
          </div>

          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <p class="text-sm text-gray-500 font-medium">当前活跃连接</p>
            <p class="text-3xl font-bold text-purple-600">
              {{ stats.active_users }}
            </p>
          </div>
        </div>

        <div class="lg:col-span-2">
          <div
            class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-full"
          >
            <h2 class="text-lg font-semibold text-gray-700 mb-4">
              近 7 日请求趋势
            </h2>
            <div id="bar-chart" style="width: 100%; height: 400px"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="text/javascript">
      // 初始化图表
      var chartDom = document.getElementById('bar-chart');
      var myChart = echarts.init(chartDom);

      // 从后端注入的数据
      var days = {{ chart_data.days | tojson }};
      var values = {{ chart_data.values | tojson }};

      var option = {
          tooltip: {
              trigger: 'axis',
              axisPointer: { type: 'shadow' }
          },
          grid: {
              left: '3%',
              right: '4%',
              bottom: '3%',
              containLabel: true
          },
          xAxis: {
              type: 'category',
              data: days,
              axisLine: { lineStyle: { color: '#999' } }
          },
          yAxis: {
              type: 'value',
              splitLine: { lineStyle: { type: 'dashed' } }
          },
          series: [
              {
                  name: '请求数',
                  type: 'bar',
                  barWidth: '60%',
                  data: values,
                  itemStyle: {
                      color: '#3b82f6', // Tailwind 的 blue-500
                      borderRadius: [4, 4, 0, 0]
                  }
              }
          ]
      };

      myChart.setOption(option);

      // 响应式处理
      window.addEventListener('resize', function() {
          myChart.resize();
      });
    </script>
  </body>
</html>
